version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: modeleuropa-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portfolio_cms
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d portfolio_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modeleuropa-app
    restart: always
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/portfolio_cms?schema=public"
      NEXTAUTH_SECRET: "your-secret-here"
      NEXTAUTH_URL: "https://demo1.xngtech.com"
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
